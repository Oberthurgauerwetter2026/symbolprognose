name: Open-Meteo Cache Ingest

on:
  # Schedule entfernt — der Cloudflare-Worker (cron-worker/) triggert
  # diesen Workflow alle 5 min zuverlässig via workflow_dispatch.
  # GitHub `schedule:` wurde wiederholt von GitHub verworfen.
  workflow_dispatch: {}

concurrency:
  group: openmeteo-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install boto3 requests

      - name: Run ingest
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CHUNK_PHASE1: "10"
          CHUNK_PHASEC: "60"
          BATCH_SLEEP_S: "2"
          OM_CONNECT_TIMEOUT: "30"
          OM_READ_TIMEOUT: "300"
          FETCH_WORKERS: "1"
          BBOX_MIN_LAT: "46.85"
          BBOX_MAX_LAT: "48.30"
          BBOX_MIN_LON: "8.15"
          BBOX_MAX_LON: "10.55"
          GRID_LAT: "22"
          GRID_LON: "36"
          # phaseA (Symbolprognose) läuft nur 4× täglich via openmeteo-symbol.yml
          SKIP_PHASEA: "1"
        run: python -u scripts/ingest_openmeteo.py
