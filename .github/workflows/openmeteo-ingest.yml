name: Open-Meteo Cache Ingest

on:
  # Schedule entfernt — der Cloudflare-Worker (cron-worker/) triggert
  # diesen Workflow alle 5 min zuverlässig via workflow_dispatch.
  # GitHub `schedule:` wurde wiederholt von GitHub verworfen.
  workflow_dispatch: {}

concurrency:
  group: openmeteo-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # Pillow + numpy werden für die Prognose-PNG-Rasterung (native
          # ICON-CH1-Auflösung) benötigt.
          python -m pip install boto3 requests numpy Pillow

      - name: Run ingest
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          CHUNK_PHASE1: "150"
          CHUNK_PHASEC: "60"
          BATCH_SLEEP_S: "0"
          OM_CONNECT_TIMEOUT: "30"
          OM_READ_TIMEOUT: "60"
          FETCH_WORKERS: "1"
          BBOX_MIN_LAT: "46.85"
          BBOX_MAX_LAT: "48.30"
          BBOX_MIN_LON: "8.15"
          BBOX_MAX_LON: "10.55"
          # Sparse-Grid (Wind, Bias, phaseA/C) — bleibt bewusst grob.
          GRID_LAT: "22"
          GRID_LON: "36"
          # Dense-Grid für die Prognose-PNGs — ~3 km, 48×56 = 2688 Punkte.
          # Bewusst konservativ, damit Open-Meteo-Minutenlimit sicher
          # unterschritten wird (18 Batches sequentiell statt 84 parallel).
          GRID_LAT_DENSE: "48"
          GRID_LON_DENSE: "56"
          # Erlaubte Ausfallquote (%) einzelner Batches für phase1 dense,
          # bevor die PNG-Rasterung aufgegeben wird.
          PHASE1_DENSE_MAX_FAIL_PCT: "20"
          # phaseA (Symbolprognose) läuft nur 4× täglich via openmeteo-symbol.yml
          SKIP_PHASEA: "1"
        run: python -u scripts/ingest_openmeteo.py

