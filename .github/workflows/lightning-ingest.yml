name: Lightning Ingest

on:
  schedule:
    # alle 5 Minuten (kleinstes GitHub-Cron-Intervall)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: lightning-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt

      - name: Run ingest
        env:
          BLITZORTUNG_USERNAME: ${{ secrets.BLITZORTUNG_USERNAME }}
          BLITZORTUNG_PASSWORD: ${{ secrets.BLITZORTUNG_PASSWORD }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: python -u scripts/ingest_lightning.py
