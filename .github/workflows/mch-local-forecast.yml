name: MCH Local-Forecast (OGD)

on:
  # Schedule entfernt — der Cloudflare Worker (cron-worker/) triggert
  # diesen Workflow stündlich via workflow_dispatch.
  workflow_dispatch: {}

concurrency:
  group: mch-local-forecast
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install boto3 requests

      - name: Run MCH local-forecast ingest
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          MCH_OUT_KEY: "mch/local_forecast.json"
        run: python -u scripts/ingest_mch_local_forecast.py
