name: Radar Ingest

on:
  # Trigger ausschliesslich via Cloudflare Worker (cron-worker/) alle 5 min.
  # GitHub `schedule:` entfernt — wurde wiederholt von GitHub verworfen
  # und verursachte parallele Läufe / unnötige MCH-Calls.
  workflow_dispatch: {}



concurrency:
  group: radar-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      EXPECTED_RADAR_INGEST_VERSION: "v21-rzc-instant"
      RADAR_LOOKBACK_HOURS: "6"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt

      - name: Show version info
        run: |
          echo "commit: $GITHUB_SHA"
          echo "ref: $GITHUB_REF"
          echo "expected ingest version: $EXPECTED_RADAR_INGEST_VERSION"
          echo "RADAR_LOOKBACK_HOURS: $RADAR_LOOKBACK_HOURS"
          echo "--- ingest_radar.py head ---"
          sed -n '1,30p' scripts/ingest_radar.py
          echo "--- list_recent_assets signature ---"
          grep -n "def list_recent_assets\|RADAR_INGEST_VERSION\|def _extract_assets" scripts/ingest_radar.py || true

      - name: Verify ingest version
        run: |
          if ! grep -q "RADAR_INGEST_VERSION = \"${EXPECTED_RADAR_INGEST_VERSION}\"" scripts/ingest_radar.py; then
            echo "ERROR: GitHub Actions is not running the expected ingest script version: ${EXPECTED_RADAR_INGEST_VERSION}"
            echo "This usually means the workflow is on an older commit or branch."
            echo "--- current ingest_radar.py version lines ---"
            grep -n "RADAR_INGEST_VERSION" scripts/ingest_radar.py || true
            exit 1
          fi

      - name: Run ingest
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: python -u scripts/ingest_radar.py
